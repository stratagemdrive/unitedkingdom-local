name: UK News Scraper

on:
  schedule:
    # 6 AM EST  = 11:00 UTC
    - cron: "0 11 * * *"
    # 6 PM EST  = 23:00 UTC
    - cron: "0 23 * * *"
  workflow_dispatch: # allow manual runs

permissions:
  contents: write   # needed to push docs/UnitedKingdom_news.json

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1   # shallow clone is enough

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Dependencies ────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run scraper ─────────────────────────────────────────────────────
      - name: Fetch and categorise UK news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_news.py

      # ── 5. Commit & push if anything changed ───────────────────────────────
      - name: Commit updated JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/UnitedKingdom_news.json
          # Only commit if the file actually changed
          git diff --cached --quiet || \
            git commit -m "chore: update UnitedKingdom_news.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"

      - name: Push changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
